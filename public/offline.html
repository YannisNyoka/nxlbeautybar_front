<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#3d1f15" />
  <title>No Internet Connection — NXL Beauty Bar</title>
  <link rel="icon" href="/favicon.ico" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap');

    :root {
      --brown: #3d1f15;
      --mid:   #6b3528;
      --gold:  #c9a96e;
      --cream: #ffe8d6;
      --bg:    #fdf6f0;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      font-family: 'DM Sans', -apple-system, sans-serif;
      color: var(--brown);
      text-align: center;
    }

    .card {
      max-width: 440px;
      width: 100%;
      background: #fff;
      border: 1px solid #e0ccc4;
      border-radius: 24px;
      padding: 3rem 2.5rem;
      box-shadow: 0 8px 40px rgba(61,31,21,0.12);
    }

    .icon {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, var(--brown), var(--mid));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin: 0 auto 1.5rem;
      box-shadow: 0 4px 20px rgba(61,31,21,0.25);
    }

    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.9rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: var(--brown);
    }

    p {
      font-size: 0.92rem;
      color: #9e7060;
      line-height: 1.65;
      margin-bottom: 2rem;
    }

    .tips {
      background: #fff8f3;
      border: 1px solid #e0ccc4;
      border-radius: 14px;
      padding: 1.25rem;
      text-align: left;
      margin-bottom: 2rem;
    }
    .tips h3 {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--mid);
      margin-bottom: 0.75rem;
    }
    .tip {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      font-size: 0.82rem;
      color: #6b3528;
      margin-bottom: 0.5rem;
      line-height: 1.5;
    }
    .tip:last-child { margin-bottom: 0; }
    .tip-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }

    .actions { display: flex; flex-direction: column; gap: 0.75rem; }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.875rem 2rem;
      background: linear-gradient(135deg, var(--brown), var(--mid));
      color: var(--cream);
      border: none;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.875rem 2rem;
      background: transparent;
      color: var(--brown);
      border: 1.5px solid #e0ccc4;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
    }
    .btn-outline:hover { border-color: var(--brown); }

    .contact {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid #f0e8e0;
      font-size: 0.78rem;
      color: #b08070;
    }
    .contact a { color: var(--mid); text-decoration: none; font-weight: 600; }

    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ef4444;
      margin-right: 6px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .online .status-dot { background: #10b981; animation: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📵</div>

    <h1>You're Offline</h1>
    <p>
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">No internet connection</span>
    </p>

    <div class="tips">
      <h3>While you wait</h3>
      <div class="tip">
        <span class="tip-icon">📶</span>
        <span>Check your Wi-Fi or mobile data connection</span>
      </div>
      <div class="tip">
        <span class="tip-icon">✈️</span>
        <span>Turn off airplane mode if it's on</span>
      </div>
      <div class="tip">
        <span class="tip-icon">🔄</span>
        <span>Try refreshing — your connection may have been restored</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn-primary" onclick="window.location.reload()">
        🔄 Try Again
      </button>
      <a href="https://wa.me/27685113394" class="btn-outline">
        💬 WhatsApp Us
      </a>
    </div>

    <div class="contact">
      <p>Need to book urgently?</p>
      <p>Call us: <a href="tel:+27685113394">068 511 3394</a> · Email: <a href="mailto:nxlbeautybar@gmail.com">nxlbeautybar@gmail.com</a></p>
    </div>
  </div>

  <script>
    // Auto-reload when connection is restored
    window.addEventListener('online', () => {
      document.getElementById('statusDot').parentElement.classList.add('online');
      document.getElementById('statusText').textContent = 'Connection restored — reloading…';
      setTimeout(() => window.location.reload(), 1200);
    });

    // Show current status on load
    if (navigator.onLine) {
      document.getElementById('statusDot').parentElement.classList.add('online');
      document.getElementById('statusText').textContent = 'You\'re back online — ';
      const reload = document.createElement('a');
      reload.href = '/'; reload.textContent = 'go back'; reload.style.cssText = 'color:#6b3528;font-weight:600;';
      document.getElementById('statusText').after(reload);
    }
  </script>
</body>
</html>
